<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지 관리 - KILC 관리자</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .page-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .page-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-color);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .page-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .page-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-published {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-draft {
            background: #fff3e0;
            color: #f57c00;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
            margin: 15px 0 10px 0;
        }

        .page-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .page-meta-item {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #666;
        }

        .page-meta-item i {
            width: 20px;
            margin-right: 8px;
            color: var(--primary-color);
        }

        .page-actions {
            display: flex;
            gap: 8px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-edit-page {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit-page:hover {
            background: #1976d2;
            color: white;
        }

        .btn-view-page {
            background: #e8f5e9;
            color: #388e3c;
        }

        .btn-view-page:hover {
            background: #388e3c;
            color: white;
        }

        .btn-delete-page {
            background: #ffebee;
            color: #d32f2f;
        }

        .btn-delete-page:hover {
            background: #d32f2f;
            color: white;
        }

        .search-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 15px;
        }

        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .filter-select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .add-page-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-page-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 134, 89, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .empty-state i {
            font-size: 64px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🏛️ KILC</h2>
                <p>관리자 시스템</p>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>대시보드</span>
                </a>
                <a href="menu-manager.html" class="nav-item">
                    <i class="fas fa-bars"></i>
                    <span>메뉴 관리</span>
                </a>
                <a href="page-manager.html" class="nav-item active">
                    <i class="fas fa-file"></i>
                    <span>페이지 관리</span>
                </a>
                <a href="content-editor.html" class="nav-item">
                    <i class="fas fa-edit"></i>
                    <span>내용 편집</span>
                </a>
                <a href="media-manager.html" class="nav-item">
                    <i class="fas fa-image"></i>
                    <span>미디어 관리</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>설정</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p class="user-name">관리자</p>
                        <p class="user-role">시스템 관리자</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    로그아웃
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1>📄 페이지 관리</h1>
                    <p>웹사이트 페이지를 관리합니다</p>
                </div>
                <div class="header-right">
                    <button class="add-page-btn" onclick="createNewPage()">
                        <i class="fas fa-plus-circle"></i>
                        새 페이지 만들기
                    </button>
                </div>
            </header>

            <!-- 검색 및 필터 -->
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="페이지 검색..." id="searchInput" onkeyup="searchPages()">
                <select class="filter-select" id="languageFilter" onchange="filterPages()">
                    <option value="all">모든 언어</option>
                    <option value="ko">한국어</option>
                    <option value="en">English</option>
                </select>
                <select class="filter-select" id="statusFilter" onchange="filterPages()">
                    <option value="all">모든 상태</option>
                    <option value="published">게시됨</option>
                    <option value="draft">임시저장</option>
                </select>
            </div>

            <!-- 페이지 그리드 -->
            <div class="page-grid" id="pageGrid">
                <!-- 페이지 카드들이 여기에 동적으로 생성됩니다 -->
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/page-manager.js"></script>
</body>
</html>
