<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 관리 - KILC 관리자</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .menu-manager {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .menu-tree {
            margin: 30px 0;
        }

        .menu-item {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 3px 10px rgba(45, 134, 89, 0.1);
        }

        .menu-item.level-1 {
            background: white;
            border-width: 2px;
        }

        .menu-item.level-2 {
            margin-left: 30px;
            border-left: 4px solid var(--primary-color);
        }

        .menu-item.level-3 {
            margin-left: 60px;
            border-left: 4px solid var(--accent-color);
            background: #f0f8f5;
        }

        .menu-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-handle {
            cursor: move;
            color: #999;
            font-size: 18px;
        }

        .menu-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-color);
        }

        .menu-link {
            font-size: 13px;
            color: #666;
            font-family: monospace;
        }

        .menu-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit:hover {
            background: #1976d2;
            color: white;
        }

        .btn-delete {
            background: #ffebee;
            color: #d32f2f;
        }

        .btn-delete:hover {
            background: #d32f2f;
            color: white;
        }

        .btn-add-sub {
            background: #e8f5e9;
            color: #388e3c;
        }

        .btn-add-sub:hover {
            background: #388e3c;
            color: white;
        }

        .add-menu-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .add-menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 134, 89, 0.3);
        }

        /* 모달 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-size: 24px;
            color: var(--primary-color);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #666;
        }

        .modal-close:hover {
            background: #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-save,
        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 134, 89, 0.3);
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .help-text {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 사이드바 (동일) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🏛️ KILC</h2>
                <p>관리자 시스템</p>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>대시보드</span>
                </a>
                <a href="menu-manager.html" class="nav-item active">
                    <i class="fas fa-bars"></i>
                    <span>메뉴 관리</span>
                </a>
                <a href="page-manager.html" class="nav-item">
                    <i class="fas fa-file"></i>
                    <span>페이지 관리</span>
                </a>
                <a href="content-editor.html" class="nav-item">
                    <i class="fas fa-edit"></i>
                    <span>내용 편집</span>
                </a>
                <a href="media-manager.html" class="nav-item">
                    <i class="fas fa-image"></i>
                    <span>미디어 관리</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>설정</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p class="user-name">관리자</p>
                        <p class="user-role">시스템 관리자</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    로그아웃
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1>📋 메뉴 관리</h1>
                    <p>웹사이트 메뉴 구조를 관리합니다</p>
                </div>
                <div class="header-right">
                    <button class="btn-preview" onclick="previewSite()">
                        <i class="fas fa-eye"></i>
                        사이트 미리보기
                    </button>
                </div>
            </header>

            <div class="menu-manager">
                <h2>🗂️ 메뉴 구조</h2>
                <p style="color: #666; margin-bottom: 20px;">
                    메뉴를 드래그하여 순서를 변경하거나, 편집/삭제할 수 있습니다.
                </p>

                <div class="menu-tree" id="menuTree">
                    <!-- 메뉴 아이템들이 여기에 동적으로 생성됩니다 -->
                </div>

                <button class="add-menu-btn" onclick="openAddMenuModal()">
                    <i class="fas fa-plus-circle"></i>
                    새 메뉴 추가
                </button>
            </div>
        </main>
    </div>

    <!-- 메뉴 추가/편집 모달 -->
    <div class="modal" id="menuModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">새 메뉴 추가</h2>
                <button class="modal-close" onclick="closeMenuModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="menuForm">
                <input type="hidden" id="menuId">
                
                <div class="form-group">
                    <label for="menuName">메뉴 이름 *</label>
                    <input type="text" id="menuName" placeholder="예: KILC 소개" required>
                    <p class="help-text">메뉴에 표시될 이름을 입력하세요</p>
                </div>

                <div class="form-group">
                    <label for="menuLink">링크 주소</label>
                    <input type="text" id="menuLink" placeholder="예: pages/greeting.html 또는 #">
                    <p class="help-text">페이지 링크 또는 # (드롭다운 메뉴의 경우)</p>
                </div>

                <div class="form-group">
                    <label for="menuParent">상위 메뉴</label>
                    <select id="menuParent">
                        <option value="">없음 (최상위 메뉴)</option>
                        <!-- 동적으로 생성 -->
                    </select>
                    <p class="help-text">서브메뉴로 만들려면 상위 메뉴를 선택하세요</p>
                </div>

                <div class="form-group">
                    <label for="menuOrder">순서</label>
                    <input type="number" id="menuOrder" min="1" value="1">
                    <p class="help-text">메뉴 표시 순서 (작은 숫자가 먼저 표시됩니다)</p>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeMenuModal()">취소</button>
                    <button type="submit" class="btn-save">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/menu-manager.js"></script>
</body>
</html>
