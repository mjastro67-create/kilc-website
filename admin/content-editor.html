<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내용 편집 - KILC 관리자</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Quill WYSIWYG Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .editor-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .editor-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .editor-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .editor-title input {
            flex: 1;
            font-size: 24px;
            font-weight: 600;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            padding: 10px 0;
            color: var(--text-color);
        }

        .editor-title input:focus {
            outline: none;
            border-bottom-color: var(--primary-color);
        }

        .editor-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .meta-item label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        .meta-item select,
        .meta-item input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .meta-item select:focus,
        .meta-item input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* Quill Editor 스타일 */
        #editor {
            min-height: 500px;
            background: white;
        }

        .ql-toolbar {
            background: #f9f9f9;
            border-radius: 8px 8px 0 0;
            border: 2px solid #e0e0e0 !important;
        }

        .ql-container {
            border: 2px solid #e0e0e0 !important;
            border-top: none !important;
            border-radius: 0 0 8px 8px;
            font-size: 16px;
            line-height: 1.8;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .btn-primary,
        .btn-secondary,
        .btn-danger {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 134, 89, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ffebee;
            color: #d32f2f;
            margin-left: auto;
        }

        .btn-danger:hover {
            background: #d32f2f;
            color: white;
        }

        .page-selector {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .page-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-color);
        }

        .page-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .preview-mode {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: none;
        }

        .preview-mode.active {
            display: block;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .preview-header h2 {
            font-size: 32px;
            color: var(--primary-color);
        }

        .preview-content {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }

        .preview-content h1 {
            font-size: 28px;
            margin: 30px 0 15px 0;
            color: var(--primary-color);
        }

        .preview-content h2 {
            font-size: 24px;
            margin: 25px 0 12px 0;
            color: var(--secondary-color);
        }

        .preview-content p {
            margin-bottom: 15px;
        }

        .preview-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        .auto-save-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: #e8f5e9;
            color: #388e3c;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .auto-save-status.saving {
            background: #fff3e0;
            color: #f57c00;
        }

        .auto-save-status i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🏛️ KILC</h2>
                <p>관리자 시스템</p>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>대시보드</span>
                </a>
                <a href="menu-manager.html" class="nav-item">
                    <i class="fas fa-bars"></i>
                    <span>메뉴 관리</span>
                </a>
                <a href="page-manager.html" class="nav-item">
                    <i class="fas fa-file"></i>
                    <span>페이지 관리</span>
                </a>
                <a href="content-editor.html" class="nav-item active">
                    <i class="fas fa-edit"></i>
                    <span>내용 편집</span>
                </a>
                <a href="media-manager.html" class="nav-item">
                    <i class="fas fa-image"></i>
                    <span>미디어 관리</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>설정</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p class="user-name">관리자</p>
                        <p class="user-role">시스템 관리자</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    로그아웃
                </button>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1>✏️ 내용 편집</h1>
                    <p>페이지 내용을 작성하고 수정합니다</p>
                </div>
                <div class="header-right">
                    <div class="auto-save-status" id="autoSaveStatus">
                        <i class="fas fa-check-circle"></i>
                        <span>저장 완료</span>
                    </div>
                    <button class="btn-preview" onclick="togglePreview()">
                        <i class="fas fa-eye"></i>
                        <span id="previewBtnText">미리보기</span>
                    </button>
                </div>
            </header>

            <!-- 페이지 선택 -->
            <div class="page-selector">
                <label>편집할 페이지 선택</label>
                <select id="pageSelect" onchange="loadPageContent()">
                    <option value="">-- 페이지를 선택하세요 --</option>
                </select>
            </div>

            <!-- 편집 모드 -->
            <div class="editor-container" id="editorMode">
                <div class="editor-header">
                    <div class="editor-title">
                        <input type="text" id="pageTitle" placeholder="페이지 제목을 입력하세요..." value="">
                    </div>
                    <div class="editor-meta">
                        <div class="meta-item">
                            <label>언어</label>
                            <select id="pageLanguage">
                                <option value="ko">한국어</option>
                                <option value="en">English</option>
                            </select>
                        </div>
                        <div class="meta-item">
                            <label>상태</label>
                            <select id="pageStatus">
                                <option value="draft">임시저장</option>
                                <option value="published">게시</option>
                            </select>
                        </div>
                        <div class="meta-item">
                            <label>URL 경로</label>
                            <input type="text" id="pagePath" placeholder="pages/example.html">
                        </div>
                    </div>
                </div>

                <!-- Quill Editor -->
                <div id="editor"></div>

                <!-- 액션 버튼 -->
                <div class="editor-actions">
                    <button class="btn-primary" onclick="savePage()">
                        <i class="fas fa-save"></i>
                        저장
                    </button>
                    <button class="btn-secondary" onclick="saveDraft()">
                        <i class="fas fa-file"></i>
                        임시저장
                    </button>
                    <button class="btn-secondary" onclick="location.href='page-manager.html'">
                        <i class="fas fa-arrow-left"></i>
                        목록으로
                    </button>
                    <button class="btn-danger" onclick="deletePage()">
                        <i class="fas fa-trash"></i>
                        삭제
                    </button>
                </div>
            </div>

            <!-- 미리보기 모드 -->
            <div class="preview-mode" id="previewMode">
                <div class="preview-header">
                    <h2 id="previewTitle">페이지 제목</h2>
                    <button class="btn-secondary" onclick="togglePreview()">
                        <i class="fas fa-edit"></i>
                        편집 모드로 돌아가기
                    </button>
                </div>
                <div class="preview-content" id="previewContent">
                    <!-- 미리보기 내용 -->
                </div>
            </div>
        </main>
    </div>

    <!-- Quill Editor -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/content-editor.js"></script>
</body>
</html>
